<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lumen Invoices</title>
<style>
  :root{
    --navy:#3e4b61; --ink:#374151; --muted:#6b7280; --line:#d8dde3;
    --paper:#fff; --bg:#eef0f3; --accent:#b84b1e; --cream:#f5f1e8;
    --field-border:#cdd4de; --radius:12px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
  }

  /* ---------- App bar ---------- */
  .appbar{
    position:sticky; top:0; z-index:30; background:var(--navy); color:#fff;
    display:flex; align-items:center; gap:12px; padding:11px 16px;
  }
  .appbar .brand{font-weight:700; font-size:16px; letter-spacing:.3px;}
  .appbar .brand span{color:#e8895a;}
  .appbar .spacer{flex:1;}
  .seg{display:flex; background:rgba(255,255,255,.14); border-radius:9px; padding:3px;}
  .seg button{font:inherit; font-size:13px; font-weight:600; border:none; background:transparent;
    color:#fff; padding:7px 14px; border-radius:7px; cursor:pointer;}
  .seg button.active{background:#fff; color:var(--navy);}
  .pdf-btn{font:inherit; font-size:13px; font-weight:700; border:none; border-radius:8px;
    padding:9px 15px; background:var(--accent); color:#fff; cursor:pointer;}

  /* ---------- Tabs (mobile) ---------- */
  .tabbar{display:none; background:#fff; border-bottom:1px solid var(--line);
    position:sticky; top:53px; z-index:20;}
  .tabbar button{flex:1; font:inherit; font-size:14px; font-weight:600; border:none;
    background:transparent; color:var(--muted); padding:13px 0; cursor:pointer; border-bottom:2px solid transparent;}
  .tabbar button.active{color:var(--navy); border-bottom-color:var(--accent);}

  /* ---------- Layout ---------- */
  .app{max-width:1180px; margin:0 auto; display:flex; gap:22px; padding:18px;}
  .panel-edit{flex:1; min-width:0;}
  .panel-preview{flex:1; min-width:0;}
  @media (min-width:900px){
    .panel-edit{max-width:470px;}
    .panel-preview{position:sticky; top:84px; align-self:flex-start; max-height:calc(100vh - 104px); overflow:auto;}
  }

  /* ---------- Form ---------- */
  .card{background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px;}
  .card > h3{margin:0 0 13px; font-size:12px; font-weight:700; letter-spacing:.7px;
    text-transform:uppercase; color:var(--accent);}
  .field{margin-bottom:13px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px;}
  .field input, .field textarea, .field select{
    width:100%; font:inherit; font-size:16px; color:var(--ink);
    border:1px solid var(--field-border); border-radius:9px; padding:11px 12px; background:#fff;
  }
  .field textarea{resize:vertical; line-height:1.5;}
  .field input:focus, .field textarea:focus, .field select:focus{
    outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(184,75,30,.12);}
  .two{display:flex; gap:10px;}
  .two .field{flex:1;}
  .inline-prefix{position:relative;}
  .inline-prefix span{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; pointer-events:none;}
  .inline-prefix input{padding-left:24px;}

  .btn{font:inherit; font-size:14px; font-weight:600; border:none; border-radius:9px;
    padding:11px 14px; cursor:pointer;}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.soft{background:var(--cream); color:var(--navy); border:1px solid var(--field-border);}
  .btn.full{width:100%;}
  .btn-row{display:flex; gap:9px; flex-wrap:wrap;}
  .status{font-size:12px; color:var(--muted); margin-top:8px; min-height:14px;}

  /* line item cards */
  .item{border:1px solid var(--field-border); border-radius:10px; padding:13px; margin-bottom:11px; background:#fcfcfb;}
  .item .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:9px;}
  .item .top .n{font-size:12px; font-weight:700; color:var(--navy);}
  .item .top .rm{font:inherit; font-size:13px; font-weight:600; border:none; background:transparent;
    color:#b4341f; cursor:pointer; padding:4px 6px;}
  .item .amt{text-align:right; font-size:13px; color:var(--muted); margin-top:8px;}
  .item .amt b{color:var(--navy); font-size:15px;}

  /* photo rows in the form */
  .photo-row{display:flex; gap:11px; align-items:flex-start; margin-bottom:11px;}
  .photo-row img{width:84px; height:84px; object-fit:cover; border-radius:9px; border:1px solid var(--field-border); flex:none; cursor:pointer;}

  /* full-size photo viewer */
  #lightbox{position:fixed; inset:0; background:rgba(15,18,24,.92); display:none;
    flex-direction:column; align-items:center; justify-content:center; z-index:100; padding:18px;}
  #lightbox.open{display:flex;}
  .lb-stage{overflow:hidden; max-width:100%; max-height:78vh; display:flex; align-items:center;
    justify-content:center; touch-action:none;}
  #lightbox img{max-width:100%; max-height:78vh; border-radius:9px; box-shadow:0 10px 40px rgba(0,0,0,.5);
    transform-origin:center center; -webkit-user-drag:none; user-select:none; cursor:grab;}
  #lightbox .close{position:absolute; top:14px; right:18px; color:#fff; font-size:34px; line-height:1;
    font-weight:300; cursor:pointer; background:none; border:none;}
  #lightbox .cap{margin-top:12px; text-align:center; color:#fff; font-size:14px; padding:0 20px; min-height:1px;}
  .lb-zoom{margin-top:14px; display:flex; gap:8px; align-items:center;}
  .lb-zoom button{height:42px; min-width:48px; border:none; border-radius:9px;
    background:rgba(255,255,255,.16); color:#fff; font-size:19px; font-weight:700; cursor:pointer;}
  .lb-zoom button.reset{font-size:13px; padding:0 16px;}
  .invoice-doc figure img{cursor:pointer;}
  .photo-row .pmeta{flex:1; min-width:0; display:flex; flex-direction:column; gap:8px;}
  .photo-row .pmeta input{width:100%; font:inherit; font-size:15px; border:1px solid var(--field-border); border-radius:9px; padding:9px 11px;}
  .photo-row .pmeta input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(184,75,30,.12);}
  .photo-row .rm{align-self:flex-start; font:inherit; font-size:13px; font-weight:600; border:none; background:transparent; color:#b4341f; cursor:pointer; padding:2px 0;}

  /* totals summary */
  .summary{background:var(--cream); border:1px solid var(--field-border);}
  .summary .row{display:flex; justify-content:space-between; padding:7px 0; font-size:14px;}
  .summary .row.grand{border-top:2px solid var(--accent); margin-top:6px; padding-top:12px;}
  .summary .row.grand b{font-size:19px; color:var(--navy);}
  .summary .row span:first-child{color:var(--navy); font-weight:600;}

  /* ---------- Bottom action bar (mobile) ---------- */
  .bottombar{display:none;}

  /* ---------- Invoice preview document ---------- */
  .doc-shell{background:#fff; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .invoice-doc{background:#fff; padding:42px 44px 50px; position:relative; font-size:14px; color:var(--ink);}
  .invoice-doc::before{content:""; position:absolute; top:0; left:0; right:0; height:9px; background:var(--accent);}
  .invoice-doc .head{display:flex; gap:22px; align-items:flex-start; margin-top:10px;}
  .invoice-doc .logo{width:128px; flex:none;}
  .invoice-doc .logo img{max-width:128px; max-height:128px; display:block;}
  .invoice-doc h1{font-size:21px; color:var(--navy); margin:0 0 9px; font-weight:700;}
  .invoice-doc .cline{font-size:13px; line-height:1.8; color:var(--ink);}
  .invoice-doc .cline b{font-weight:700;}
  .invoice-doc .cline a{color:var(--accent); text-decoration:none;}
  .invoice-doc .title{text-align:right; margin:26px 0 16px; font-size:24px; font-weight:700; letter-spacing:3px; color:var(--accent);}
  .invoice-doc .meta{display:grid; grid-template-columns:repeat(3,auto) 1fr; gap:0 30px;
    border-top:1px solid var(--line); padding-top:16px;}
  .invoice-doc .meta .lbl{font-size:10.5px; font-weight:700; letter-spacing:.7px; color:var(--navy); text-transform:uppercase;}
  .invoice-doc .meta .val{font-size:13.5px; margin-top:4px;}
  .invoice-doc .meta .bal{text-align:right;}
  .invoice-doc .meta .bal .val{font-weight:700; color:var(--navy);}
  .invoice-doc .section-lbl{font-size:10.5px; font-weight:700; letter-spacing:.7px; color:var(--navy); text-transform:uppercase; margin-bottom:5px;}
  .invoice-doc .billto{margin-top:22px;}
  .invoice-doc .billto .v{font-size:13.5px; line-height:1.7; white-space:pre-wrap;}
  .invoice-doc .job{margin-top:22px;}
  .invoice-doc .job .v{font-size:17px; font-weight:700; color:var(--navy);}
  .invoice-doc table{width:100%; border-collapse:collapse; margin-top:20px;}
  .invoice-doc th{background:var(--cream); color:var(--navy); font-size:10.5px; font-weight:700;
    letter-spacing:.7px; text-transform:uppercase; text-align:right; padding:10px 11px; border:1px solid var(--line);}
  .invoice-doc th.d{text-align:left;}
  .invoice-doc td{padding:11px; border:1px solid var(--line); font-size:13.5px; text-align:right; vertical-align:top;}
  .invoice-doc td.d{text-align:left; white-space:pre-wrap;}
  .invoice-doc .totals{display:flex; justify-content:flex-end; margin-top:6px;}
  .invoice-doc .totals table{width:320px; border-collapse:collapse;}
  .invoice-doc .totals td{padding:10px 11px; border:none; font-size:13.5px;}
  .invoice-doc .totals td.k{color:var(--navy); font-weight:700; letter-spacing:.4px; font-size:11.5px; text-transform:uppercase; text-align:left;}
  .invoice-doc .totals tr.div td{border-top:1px solid var(--line);}
  .invoice-doc .totals tr.grand td{border-top:2px solid var(--accent); padding-top:13px;}
  .invoice-doc .totals tr.grand td.v{font-size:19px; font-weight:700; color:var(--navy);}
  .invoice-doc .notes{margin-top:26px; font-size:12.5px; color:var(--muted); line-height:1.7; white-space:pre-wrap;}
  .invoice-doc .photos{margin-top:24px;}
  .invoice-doc .pgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px;}
  .invoice-doc figure{margin:0;}
  .invoice-doc figure img{width:100%; border-radius:7px; border:1px solid var(--line); display:block;}
  .invoice-doc figcaption{font-size:11.5px; color:var(--muted); margin-top:5px; line-height:1.5;}
  .invoice-doc .thanks{margin-top:30px; text-align:center; font-size:12.5px; color:var(--muted);}

  .preview-hint{font-size:12px; color:var(--muted); text-align:center; padding:10px 0 0;}

  /* ---------- Mobile ---------- */
  @media (max-width:899px){
    .appbar .seg{display:none;}
    .tabbar{display:flex;}
    .app{display:block; padding:14px; padding-bottom:88px;}
    .panel-preview{display:none;}
    body.show-preview .panel-edit{display:none;}
    body.show-preview .panel-preview{display:block;}
    .invoice-doc{padding:26px 20px 34px;}
    .invoice-doc .head{flex-direction:column; align-items:center; text-align:center; gap:12px;}
    .invoice-doc .title{text-align:center;}
    .invoice-doc .meta{grid-template-columns:1fr 1fr; gap:13px 14px;}
    .invoice-doc .meta .bal{grid-column:1/-1; text-align:left;}
    .invoice-doc .meta .bal .val{}
    .bottombar{display:flex; gap:10px; position:fixed; bottom:0; left:0; right:0; z-index:30;
      background:#fff; border-top:1px solid var(--line); padding:11px 14px;
      padding-bottom:calc(11px + env(safe-area-inset-bottom));}
    .bottombar .btn{flex:1;}
  }

  /* ---------- Print ---------- */
  @media print{
    @page{size:letter; margin:11mm;}
    body{background:#fff;}
    .appbar,.tabbar,.panel-edit,.bottombar,.preview-hint{display:none !important;}
    #lightbox{display:none !important;}
    .app{display:block; padding:0; max-width:none;}
    .panel-preview{display:block !important; position:static; max-height:none; overflow:visible;}
    .doc-shell{border:none; border-radius:0;}
    .invoice-doc{padding:0; font-size:12.5px;}
    .invoice-doc::before{display:none;}
    /* compact spacing so a standard invoice fits one page */
    .invoice-doc .head{margin-top:0; gap:18px;}
    .invoice-doc .logo{width:100px;}
    .invoice-doc .logo img{max-width:100px; max-height:100px;}
    .invoice-doc h1{font-size:18px; margin-bottom:7px;}
    .invoice-doc .cline{font-size:11.5px; line-height:1.6;}
    .invoice-doc .title{margin:14px 0 10px; font-size:21px;}
    .invoice-doc .meta{padding-top:12px;}
    .invoice-doc .billto{margin-top:14px;}
    .invoice-doc .job{margin-top:14px;}
    .invoice-doc .job .v{font-size:15px;}
    .invoice-doc table{margin-top:13px;}
    .invoice-doc th{padding:7px 10px;}
    .invoice-doc td{padding:8px 10px; font-size:12.5px;}
    .invoice-doc .totals{margin-top:4px;}
    .invoice-doc .totals td{padding:7px 10px;}
    .invoice-doc .totals tr.grand td{padding-top:10px;}
    .invoice-doc .notes{margin-top:16px;}
    .invoice-doc .thanks{margin-top:18px;}
    .invoice-doc .photos{margin-top:18px;}
    .invoice-doc figure{page-break-inside:avoid;}
    /* keep blocks from splitting awkwardly across pages */
    .invoice-doc table, .invoice-doc .totals, .invoice-doc .billto{page-break-inside:avoid;}
    tr{page-break-inside:avoid;}
  }
</style>
</head>
<body>

<div class="appbar">
  <div class="brand">Lumen <span>Invoices</span></div>
  <div class="seg">
    <button id="segInv" class="active" onclick="setMode('invoice')">Invoice</button>
    <button id="segEst" onclick="setMode('estimate')">Estimate</button>
  </div>
  <div class="spacer"></div>
  <button class="pdf-btn" onclick="window.print()">Save PDF</button>
</div>

<div class="tabbar">
  <button id="tabEdit" class="active" onclick="showTab('edit')">Edit</button>
  <button id="tabPrev" onclick="showTab('preview')">Preview</button>
</div>

<div class="app">

  <!-- ============ EDIT ============ -->
  <div class="panel-edit">

    <div class="card">
      <h3>Drafts</h3>
      <div class="field">
        <label>Open a saved draft</label>
        <select id="draftPicker" onchange="loadDraft(this.value)">
          <option value="">Choose a draft…</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="saveDraft()">Save as draft</button>
        <button class="btn soft" onclick="deleteDraft()">Delete</button>
        <button class="btn soft" onclick="newBlank()">Start new</button>
      </div>
      <div class="status" id="draftStatus"></div>
    </div>

    <div class="card">
      <h3>Document</h3>
      <div class="two">
        <div class="field">
          <label id="lblNumber">Invoice number</label>
          <input id="f_number" type="text" value="INVOICE120" oninput="sync()">
        </div>
        <div class="field">
          <label>Date</label>
          <input id="f_date" type="text" value="Jun 23, 2026" oninput="sync()">
        </div>
      </div>
      <div class="field">
        <label id="lblDue">Due</label>
        <input id="f_due" type="text" value="On Receipt" oninput="sync()">
      </div>
    </div>

    <div class="card">
      <h3>Bill To</h3>
      <div class="field">
        <label>Saved clients</label>
        <select id="f_clientPicker" onchange="loadClient(this.value)">
          <option value="">Choose a saved client…</option>
        </select>
      </div>
      <div class="field">
        <label>Client name</label>
        <input id="f_billName" type="text" placeholder="e.g. Snow Painting" oninput="sync()">
      </div>
      <div class="field">
        <label>Address</label>
        <textarea id="f_billAddress" rows="3" placeholder="Street&#10;City, Province  Postal Code" oninput="sync()"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn soft" onclick="saveClient()">Save this client</button>
        <button class="btn soft" onclick="removeClient()">Remove selected</button>
      </div>
      <div class="status" id="clientStatus"></div>
    </div>

    <div class="card">
      <h3>Job</h3>
      <div class="field">
        <label>Job name</label>
        <input id="f_job" type="text" placeholder="e.g. Interior repaint, main floor" oninput="sync()">
      </div>
    </div>

    <div class="card">
      <h3>Line items</h3>
      <div id="itemsWrap"></div>
      <button class="btn soft full" onclick="addItem()">+ Add line item</button>
    </div>

    <div class="card">
      <h3>Totals</h3>
      <div class="two">
        <div class="field">
          <label>Tax rate (%)</label>
          <input id="f_tax" type="text" inputmode="decimal" value="13" oninput="sync()">
        </div>
        <div class="field" id="paidField">
          <label>Amount paid</label>
          <div class="inline-prefix"><span>$</span><input id="f_paid" type="text" inputmode="decimal" value="0" oninput="sync()"></div>
        </div>
      </div>
      <div class="summary card" style="margin:4px 0 0;">
        <div class="row"><span>Subtotal</span><span id="s_sub">$0.00</span></div>
        <div class="row"><span>Tax (<span id="s_taxRate">13</span>%)</span><span id="s_tax">$0.00</span></div>
        <div class="row"><span>Total</span><span id="s_total">$0.00</span></div>
        <div class="row grand"><span id="s_balLbl">Balance Due</span><b id="s_bal">CAD $0.00</b></div>
      </div>
    </div>

    <div class="card">
      <h3>Footer note</h3>
      <div class="field">
        <textarea id="f_notes" rows="2" oninput="sync()">Payment: e-transfer to lumenpainting@hotmail.com</textarea>
      </div>
    </div>

    <div class="card">
      <h3>Photos</h3>
      <button class="btn soft full" onclick="document.getElementById('photoInput').click()">+ Add photos</button>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="addPhotos(event)">
      <div id="photosWrap" style="margin-top:12px;"></div>
    </div>

    <div class="card">
      <h3>Branding</h3>
      <div class="btn-row">
        <button class="btn soft" onclick="document.getElementById('logoInput').click()">Change logo</button>
        <button class="btn soft" onclick="resetLogo()">Use default logo</button>
      </div>
      <input type="file" id="logoInput" accept="image/*" style="display:none" onchange="loadLogo(event)">
      <div class="status" id="logoStatus"></div>
    </div>

  </div>

  <!-- ============ PREVIEW ============ -->
  <div class="panel-preview">
    <div class="doc-shell">
      <div class="invoice-doc" id="doc"></div>
    </div>
    <div class="preview-hint">This is exactly how the PDF will look.</div>
  </div>

</div>

<div class="bottombar">
  <button class="btn soft" onclick="showTab('edit')">Edit</button>
  <button class="btn primary" onclick="window.print()" style="flex:2;">Save as PDF</button>
</div>

<div id="lightbox" onclick="lbBackdrop(event)">
  <button class="close" aria-label="Close" onclick="closeLightbox()">&times;</button>
  <div class="lb-stage" id="lbStage"><img id="lightboxImg" src="" alt=""></div>
  <div class="cap" id="lightboxCap"></div>
  <div class="lb-zoom">
    <button aria-label="Zoom out" onclick="lbZoom(-1)">&minus;</button>
    <button class="reset" onclick="lbReset()">Reset</button>
    <button aria-label="Zoom in" onclick="lbZoom(1)">+</button>
  </div>

function money(n){return '$'+(Math.round(n*100)/100).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});}
function num(v){var x=parseFloat(String(v).replace(/[^0-9.\-]/g,''));return isNaN(x)?0:x;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- line items ---------- */
function renderItems(){
  var wrap=document.getElementById('itemsWrap'); wrap.innerHTML='';
  state.items.forEach(function(it,i){
    var div=document.createElement('div'); div.className='item';
    div.innerHTML=
      '<div class="top"><span class="n">Item '+(i+1)+'</span>'+
      (state.items.length>1?'<button class="rm" onclick="delItem('+i+')">Remove</button>':'')+'</div>'+
      '<div class="field"><label>Description</label><textarea rows="2" oninput="upd('+i+',\'desc\',this.value)">'+esc(it.desc)+'</textarea></div>'+
      '<div class="two">'+
        '<div class="field"><label>Rate</label><div class="inline-prefix"><span>$</span><input type="text" inputmode="decimal" value="'+it.rate+'" oninput="upd('+i+',\'rate\',this.value)" style="padding-left:24px"></div></div>'+
        '<div class="field"><label>Qty</label><input type="text" inputmode="numeric" value="'+it.qty+'" oninput="upd('+i+',\'qty\',this.value)"></div>'+
      '</div>'+
      '<div class="amt">Amount: <b data-amt="'+i+'">$0.00</b></div>';
    wrap.appendChild(div);
  });
  calcAndPaint();
}
function upd(i,k,v){state.items[i][k]=v;calcAndPaint();renderDoc();}
function addItem(){state.items.push({desc:'',rate:'',qty:''});renderItems();renderDoc();}
function delItem(i){state.items.splice(i,1);renderItems();renderDoc();}

/* ---------- calculations ---------- */
function totals(){
  var sub=0;
  state.items.forEach(function(it){
    var r=num(it.rate); var q=(String(it.qty).trim()==='')?(r?1:0):num(it.qty);
    sub+=r*q;
  });
  var taxRate=num(state.tax);
  var tax=sub*taxRate/100;
  var total=sub+tax;
  var paid=state.mode==='estimate'?0:num(state.paid);
  return {sub:sub,taxRate:taxRate,tax:tax,total:total,paid:paid,balance:total-paid};
}
function calcAndPaint(){
  var t=totals();
  state.items.forEach(function(it,i){
    var r=num(it.rate); var q=(String(it.qty).trim()==='')?(r?1:0):num(it.qty);
    var el=document.querySelector('[data-amt="'+i+'"]'); if(el) el.textContent=money(r*q);
  });
  document.getElementById('s_sub').textContent=money(t.sub);
  document.getElementById('s_taxRate').textContent=t.taxRate;
  document.getElementById('s_tax').textContent=money(t.tax);
  document.getElementById('s_total').textContent=money(t.total);
  document.getElementById('s_bal').textContent='CAD '+money(t.balance);
}

/* ---------- read form into state ---------- */
function sync(){
  state.number=document.getElementById('f_number').value;
  state.date=document.getElementById('f_date').value;
  state.due=document.getElementById('f_due').value;
  state.billName=document.getElementById('f_billName').value;
  state.billAddress=document.getElementById('f_billAddress').value;
  state.job=document.getElementById('f_job').value;
  state.tax=document.getElementById('f_tax').value;
  state.paid=document.getElementById('f_paid').value;
  state.notes=document.getElementById('f_notes').value;
  calcAndPaint(); renderDoc();
}

/* ---------- preview document ---------- */
function logoSrc(){return customLogo||DEFAULT_LOGO;}
function renderDoc(){
  var t=totals();
  var isEst=state.mode==='estimate';
  var rows=state.items.map(function(it){
    var r=num(it.rate); var q=(String(it.qty).trim()==='')?(r?1:0):num(it.qty);
    if(!it.desc && !it.rate && !it.qty) return '';
    return '<tr><td class="d">'+esc(it.desc)+'</td><td>'+(it.rate!==''?money(r):'')+'</td><td>'+(q||'')+'</td><td>'+money(r*q)+'</td></tr>';
  }).join('');
  if(!rows) rows='<tr><td class="d">&nbsp;</td><td></td><td></td><td>$0.00</td></tr>';

  var billBlock='';
  if(state.billName || state.billAddress){
    billBlock=esc(state.billName)+(state.billName&&state.billAddress?'\n':'')+esc(state.billAddress);
  }

  var company='<div class="head"><div class="logo"><img src="'+logoSrc()+'" alt="logo"></div><div class="co">'+
    '<h1>'+COMPANY.name+'</h1>'+
    COMPANY.lines.map(function(l){return '<div class="cline">'+l+'</div>';}).join('')+
    '</div></div>';

  var html=company+
    '<div class="title">'+(isEst?'ESTIMATE':'INVOICE')+'</div>'+
    '<div class="meta">'+
      '<div><div class="lbl">'+(isEst?'Estimate':'Invoice')+'</div><div class="val">'+esc(state.number)+'</div></div>'+
      '<div><div class="lbl">Date</div><div class="val">'+esc(state.date)+'</div></div>'+
      '<div><div class="lbl">'+(isEst?'Valid Until':'Due')+'</div><div class="val">'+esc(state.due)+'</div></div>'+
      '<div class="bal"><div class="lbl">'+(isEst?'Estimated Total':'Balance Due')+'</div><div class="val">CAD '+money(t.balance)+'</div></div>'+
    '</div>'+
    (billBlock?'<div class="billto"><div class="section-lbl">Bill To</div><div class="v">'+billBlock+'</div></div>':'')+
    (state.job?'<div class="job"><div class="section-lbl">Job</div><div class="v">'+esc(state.job)+'</div></div>':'')+
    '<table><thead><tr><th class="d">Description</th><th style="width:108px">Rate</th><th style="width:64px">Qty</th><th style="width:112px">Amount</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div class="totals"><table>'+
      '<tr><td class="k">Subtotal</td><td class="v">'+money(t.sub)+'</td></tr>'+
      '<tr class="div"><td class="k">Tax ('+t.taxRate+'%)</td><td class="v">'+money(t.tax)+'</td></tr>'+
      '<tr class="div"><td class="k">Total</td><td class="v">'+money(t.total)+'</td></tr>'+
      (isEst?'':'<tr class="div"><td class="k">Amount Paid</td><td class="v">'+money(t.paid)+'</td></tr>')+
      '<tr class="grand"><td class="k">'+(isEst?'Estimated Total':'Balance Due')+'</td><td class="v">CAD '+money(t.balance)+'</td></tr>'+
    '</table></div>'+
    (state.notes?'<div class="notes">'+esc(state.notes)+'</div>':'')+
    (state.photos.length?'<div class="photos"><div class="section-lbl">Photos</div><div class="pgrid">'+
      state.photos.map(function(p,pi){return '<figure><img src="'+p.src+'" alt="" onclick="viewPhoto('+pi+')">'+(p.caption?'<figcaption>'+esc(p.caption)+'</figcaption>':'')+'</figure>';}).join('')+
      '</div></div>':'')+
    '<div class="thanks">Thank you for your business.</div>';

  document.getElementById('doc').innerHTML=html;
}

/* ---------- mode ---------- */
function applyModeUI(isEst){
  document.getElementById('lblNumber').textContent=isEst?'Estimate number':'Invoice number';
  document.getElementById('lblDue').textContent=isEst?'Valid until':'Due';
  document.getElementById('s_balLbl').textContent=isEst?'Estimated Total':'Balance Due';
  document.getElementById('paidField').style.display=isEst?'none':'';
  document.getElementById('segInv').classList.toggle('active',!isEst);
  document.getElementById('segEst').classList.toggle('active',isEst);
}
function setMode(mode){
  state.mode=mode;
  var isEst=mode==='estimate';
  var nf=document.getElementById('f_number'), df=document.getElementById('f_due');
  if(isEst){
    if(/^INVOICE/i.test(nf.value)) nf.value=nf.value.replace(/^INVOICE/i,'EST-');
    if(/^On Receipt$/i.test(df.value.trim())) df.value='30 days';
    if(/e-transfer/i.test(document.getElementById('f_notes').value)) document.getElementById('f_notes').value='This estimate is valid for 30 days. Prices are subject to change after that.';
  }else{
    if(/^EST-/i.test(nf.value)) nf.value=nf.value.replace(/^EST-/i,'INVOICE');
    if(/^30 days$/i.test(df.value.trim())) df.value='On Receipt';
    if(/valid for 30 days/i.test(document.getElementById('f_notes').value)) document.getElementById('f_notes').value='Payment: e-transfer to lumenpainting@hotmail.com';
  }
  applyModeUI(isEst);
  sync();
}

/* ---------- tabs ---------- */
function showTab(which){
  document.body.classList.toggle('show-preview', which==='preview');
  document.getElementById('tabEdit').classList.toggle('active', which==='edit');
  document.getElementById('tabPrev').classList.toggle('active', which==='preview');
  window.scrollTo(0,0);
}

/* ---------- saved clients (with in-memory fallback) ---------- */
var memClients = {};
function store(){
  try{ var raw=localStorage.getItem('lumenClients'); if(raw){ memClients = JSON.parse(raw); } }catch(e){}
  return memClients;
}
function saveStore(o){
  memClients = o;
  try{ localStorage.setItem('lumenClients',JSON.stringify(o)); return true; }catch(e){ return false; }
}
function status(id,msg){var el=document.getElementById(id);el.textContent=msg;if(msg)setTimeout(function(){if(el.textContent===msg)el.textContent='';},3000);}
function refreshPicker(){
  var sel=document.getElementById('f_clientPicker'); var c=store(); var names=Object.keys(c).sort();
  sel.innerHTML='<option value="">Choose a saved client ('+names.length+')…</option>';
  names.forEach(function(n){var o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});
}
function saveClient(){
  var name=document.getElementById('f_billName').value.trim();
  if(!name){status('clientStatus','Enter a client name first.');return;}
  var c=store(); c[name]=document.getElementById('f_billAddress').value; var ok=saveStore(c);
  refreshPicker(); document.getElementById('f_clientPicker').value=name;
  status('clientStatus', ok ? 'Saved "'+name+'".' : 'Saved for now. To keep it after closing, open this file in Safari or Chrome.');
}
function loadClient(name){
  if(!name)return; var c=store(); if(c[name]!=null){
    document.getElementById('f_billName').value=name;
    document.getElementById('f_billAddress').value=c[name]; sync();
  }
}
function removeClient(){
  var sel=document.getElementById('f_clientPicker'); var name=sel.value;
  if(!name){status('clientStatus','Pick a saved client to remove.');return;}
  var c=store(); delete c[name]; saveStore(c); refreshPicker();
  status('clientStatus','Removed "'+name+'".');
}

/* ---------- logo ---------- */
function loadLogo(e){
  var f=e.target.files[0]; if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){customLogo=ev.target.result; try{localStorage.setItem('lumenLogo',customLogo);}catch(x){} renderDoc(); status('logoStatus','Logo updated.');};
  r.readAsDataURL(f);
}
function resetLogo(){customLogo=null; try{localStorage.removeItem('lumenLogo');}catch(x){} renderDoc(); status('logoStatus','Using default logo.');}

/* ---------- photos ---------- */
function resizeImage(file, maxDim, cb){
  var img=new Image();
  var url=URL.createObjectURL(file);
  img.onload=function(){
    var w=img.width, h=img.height;
    var scale=Math.min(1, maxDim/Math.max(w,h));
    var cw=Math.max(1,Math.round(w*scale)), ch=Math.max(1,Math.round(h*scale));
    var c=document.createElement('canvas'); c.width=cw; c.height=ch;
    c.getContext('2d').drawImage(img,0,0,cw,ch);
    URL.revokeObjectURL(url);
    try{ cb(c.toDataURL('image/jpeg',0.82)); }catch(e){ cb(null); }
  };
  img.onerror=function(){ URL.revokeObjectURL(url); cb(null); };
  img.src=url;
}
function addPhotos(e){
  var files=Array.prototype.slice.call(e.target.files||[]);
  var pending=files.length; if(!pending) return;
  files.forEach(function(f){
    resizeImage(f,1100,function(data){
      if(data) state.photos.push({src:data,caption:''});
      pending--; if(pending===0){ renderPhotos(); renderDoc(); }
    });
  });
  e.target.value='';
}
function renderPhotos(){
  var w=document.getElementById('photosWrap'); w.innerHTML='';
  if(!state.photos.length){ w.innerHTML='<div class="status">No photos added yet.</div>'; return; }
  w.innerHTML='<div class="status" style="margin-bottom:8px;">Tap a photo to view it full size.</div>';
  state.photos.forEach(function(p,i){
    var row=document.createElement('div'); row.className='photo-row';
    row.innerHTML='<img src="'+p.src+'" alt="" onclick="viewPhoto('+i+')"><div class="pmeta">'+
      '<input type="text" placeholder="Caption (optional)" value="'+esc(p.caption)+'" oninput="updPhoto('+i+',this.value)">'+
      '<button class="rm" onclick="delPhoto('+i+')">Remove</button></div>';
    w.appendChild(row);
  });
}
function updPhoto(i,v){ state.photos[i].caption=v; renderDoc(); }
function delPhoto(i){ state.photos.splice(i,1); renderPhotos(); renderDoc(); }
function viewPhoto(i){
  var p=state.photos[i]; if(!p) return;
  document.getElementById('lightboxImg').src=p.src;
  document.getElementById('lightboxCap').textContent=p.caption||'';
  document.getElementById('lightbox').classList.add('open');
  lbReset();
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); lbReset(); }
function lbBackdrop(e){ if(e.target.id==='lightbox') closeLightbox(); }

/* zoom + pan controller */
var lb={s:1,tx:0,ty:0};
function lbApply(){
  var img=document.getElementById('lightboxImg');
  img.style.transform='translate('+lb.tx+'px,'+lb.ty+'px) scale('+lb.s+')';
  img.style.cursor=lb.s>1?'grab':'default';
}
function lbReset(){ lb.s=1; lb.tx=0; lb.ty=0; lbApply(); }
function lbSetScale(ns){ ns=Math.max(1,Math.min(5,ns)); lb.s=ns; if(lb.s===1){lb.tx=0;lb.ty=0;} lbApply(); }
function lbZoom(dir){ lbSetScale(lb.s*(dir>0?1.4:1/1.4)); }
function lbInit(){
  var stage=document.getElementById('lbStage'); if(!stage) return;
  var drag=null, pinch=null, lastTap=0;
  function d2(t){var dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.hypot(dx,dy);}
  stage.addEventListener('mousedown',function(e){ if(lb.s>1){drag={x:e.clientX,y:e.clientY,tx:lb.tx,ty:lb.ty}; e.preventDefault();}});
  window.addEventListener('mousemove',function(e){ if(drag){lb.tx=drag.tx+(e.clientX-drag.x); lb.ty=drag.ty+(e.clientY-drag.y); lbApply();}});
  window.addEventListener('mouseup',function(){drag=null;});
  stage.addEventListener('wheel',function(e){ e.preventDefault(); lbSetScale(lb.s*(e.deltaY<0?1.15:0.87)); },{passive:false});
  stage.addEventListener('dblclick',function(e){ e.preventDefault(); lbSetScale(lb.s>1?1:2.4); });
  stage.addEventListener('touchstart',function(e){
    if(e.touches.length===2){ pinch={d:d2(e.touches),s:lb.s}; drag=null; }
    else if(e.touches.length===1){
      var now=Date.now();
      if(now-lastTap<300){ lbSetScale(lb.s>1?1:2.4); } // double-tap toggle
      lastTap=now;
      if(lb.s>1){ drag={x:e.touches[0].clientX,y:e.touches[0].clientY,tx:lb.tx,ty:lb.ty}; }
    }
  },{passive:false});
  stage.addEventListener('touchmove',function(e){
    if(pinch && e.touches.length===2){ e.preventDefault(); lbSetScale(pinch.s*d2(e.touches)/pinch.d); }
    else if(drag && e.touches.length===1){ e.preventDefault(); lb.tx=drag.tx+(e.touches[0].clientX-drag.x); lb.ty=drag.ty+(e.touches[0].clientY-drag.y); lbApply(); }
  },{passive:false});
  stage.addEventListener('touchend',function(e){ if(e.touches.length===0){drag=null;pinch=null;} });
}

/* ---------- drafts ---------- */
function defaults(){
  return {mode:'invoice',number:'INVOICE120',date:'Jun 23, 2026',due:'On Receipt',
    billName:'',billAddress:'',job:'',items:[{desc:'',rate:'',qty:''}],tax:13,paid:0,photos:[],
    notes:'Payment: e-transfer to lumenpainting@hotmail.com'};
}
var memDrafts={};
function draftStore(){ try{var r=localStorage.getItem('lumenDrafts'); if(r) memDrafts=JSON.parse(r);}catch(e){} return memDrafts; }
function draftSaveStore(o){ memDrafts=o; try{localStorage.setItem('lumenDrafts',JSON.stringify(o)); return true;}catch(e){ return false; } }
function refreshDrafts(){
  var sel=document.getElementById('draftPicker'); var d=draftStore(); var names=Object.keys(d).sort();
  sel.innerHTML='<option value="">Choose a draft ('+names.length+')…</option>';
  names.forEach(function(n){var o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});
}
function applyState(s){
  state=JSON.parse(JSON.stringify(s));
  if(!state.items||!state.items.length) state.items=[{desc:'',rate:'',qty:''}];
  if(!state.photos) state.photos=[];
  document.getElementById('f_number').value=state.number||'';
  document.getElementById('f_date').value=state.date||'';
  document.getElementById('f_due').value=state.due||'';
  document.getElementById('f_billName').value=state.billName||'';
  document.getElementById('f_billAddress').value=state.billAddress||'';
  document.getElementById('f_job').value=state.job||'';
  document.getElementById('f_tax').value=(state.tax!=null?state.tax:13);
  document.getElementById('f_paid').value=(state.paid!=null?state.paid:0);
  document.getElementById('f_notes').value=state.notes||'';
  applyModeUI(state.mode==='estimate');
  renderItems(); renderPhotos(); renderDoc();
}
function saveDraft(){
  sync();
  var name=(state.number||'').trim() || ('Draft '+new Date().toLocaleString());
  var d=draftStore(); d[name]=JSON.parse(JSON.stringify(state)); var ok=draftSaveStore(d);
  refreshDrafts(); document.getElementById('draftPicker').value=name;
  status('draftStatus', ok ? 'Draft "'+name+'" saved.' :
    'Draft kept for now, but it is too large to store (photos take space). Open this file in a browser, or remove some photos, to keep it after closing.');
}
function loadDraft(name){
  if(!name) return;
  var d=draftStore(); if(d[name]) applyState(d[name]);
}
function deleteDraft(){
  var sel=document.getElementById('draftPicker'); var name=sel.value;
  if(!name){ status('draftStatus','Pick a draft to delete.'); return; }
  var d=draftStore(); delete d[name]; draftSaveStore(d); refreshDrafts();
  status('draftStatus','Deleted "'+name+'".');
}
function newBlank(){
  if(!confirm('Start a new blank invoice? Anything not saved as a draft will be cleared.')) return;
  applyState(defaults());
  document.getElementById('draftPicker').value='';
  status('draftStatus','Started a new blank invoice.');
}

/* ---------- paste plain text ---------- */
document.addEventListener('paste',function(e){
  var el=e.target;
  if(el && (el.tagName==='TEXTAREA'||el.tagName==='INPUT')) return; // native fields already plain
});

/* init */
renderItems();
renderPhotos();
refreshPicker();
refreshDrafts();
lbInit();
renderDoc();
</script>
